name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.8"
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Build docs
        run: uv run sphinx-build -W -b html docs docs/_build/html
