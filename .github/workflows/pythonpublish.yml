# This workflow uploads a Python package using uv when a release is created
# For more information see: https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-python#publishing-to-pypi

name: Upload Python Package

on:
  release:
    types: [created]

permissions:
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.8"
          python-version: "3.13"
      - name: Build and publish
        run: |
          uv build
          uv publish
